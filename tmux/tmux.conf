# ------------------------------------------------------------
# Gilded theme
# ------------------------------------------------------------
source-file ~/.config/tmux/gilded.tmux

# ------------------------------------------------------------
# Sensible defaults (replaces tmux-sensible plugin)
# ------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g escape-time 10           # Fast escape (was tmux-sensible: 0)
set -g focus-events on

# ------------------------------------------------------------
# Indexing & Window Management
# ------------------------------------------------------------
set -g base-index 1             # Window numbering from 1
setw -g pane-base-index 1       # Pane numbering from 1
set-option -g renumber-windows on

# ------------------------------------------------------------
# Mouse & History
# ------------------------------------------------------------
set -g mouse on
set -g history-limit 10000

# ------------------------------------------------------------
# Clipboard (OSC 52 — Neovim through Ghostty)
# ------------------------------------------------------------
set -s set-clipboard on
set -g allow-passthrough on

# ------------------------------------------------------------
# Key bindings
# ------------------------------------------------------------
set-window-option -g mode-keys vi  # Vi-style copy mode

# Open new panes/windows in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
